version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: salon_pos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-salon_pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-salon_pos_secret}
      POSTGRES_DB: ${DB_NAME:-salon_pos}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-salon_pos}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salon_pos_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-salon_pos}:${DB_PASSWORD:-salon_pos_secret}@postgres:5432/${DB_NAME:-salon_pos}
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:

name: salon_pos
description: Salon Point of Sale — fast checkout for modern salons.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.9

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Hooks
  flutter_hooks: ^0.21.0
  hooks_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Models / serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local database (offline POS support)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage (JWT token)
  flutter_secure_storage: ^9.2.2

  # Utilities
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.4.2

  # UI helpers
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.2
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
